<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Encadeada</title>

        <style>
        body {
            font-family: Arial;
            margin: 30px;
        }
        button{
            width: 150px;
        }
        input{
            width: 450px;
        }
        input, button{
            margin: 5px;
            padding: 8px;
        }
        #saida{
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
        }
    </style>

</head>
<body>
    
    <h1>Lista Encadeada (Versão Simples)</h1>

    <input type="text" id="nome" placeholder="Digite um nome">
    <br>
    <button onclick = "adicionarFim()">Adicionar no Fim</button>
    <button onclick = "adicionarInicio()">Adicionar no Início</button>
    <button onclick = "removerInicio()">Remover no Início</button>
    <br>
    <br>
    <button onclick = "contar()">Contar elementos</button>
    <button onclick = "buscar()">Buscar nome</button>
    <button onclick = "mostrar()">Mostrar Lista</button>

    <div id="saida"></div>

    <script>

    let valores = [];
    let proximo = [];
    
    let inicio = -1;
    let ultimo = -1;

    function adicionarFim(){
        let nome = document.getElementById("nome").value;

        if (nome === ""){
            alert("Digite um nome");
            return;
        }

        let novoIndice = valores.length;
        valores.push(nome);
        proximo.push(-1);

        if (inicio === -1){
            inicio = novoIndice;
            ultimo = novoIndice;
        } else {
            proximo[ultimo] = novoIndice;
            ultimo = novoIndice;
        }

        document.getElementById("nome").value = "";

        mostrar();
    }

    function adicionarInicio(){
        let nome = document.getElementById("nome").value;

        if (nome === ""){
            alert("Digite um nome");
            return;
        }

        let novoIndice = valores.length;
        valores.push(nome);

        proximo.push(inicio);

        inicio = novoIndice;

        if (ultimo === -1)
            ultimo = novoIndice;

        document.getElementById("nome").value = "";

        mostrar();
    }

    function removerInicio(){
        if (inicio === -1){
            alert("Lista Vazia")
            return;
        }

        inicio = proximo[inicio];

        if (inicio === -1)
            ultimo = -1;
        
        mostrar();
    }

    function mostrar(){
        let resultado = "";
        let atual = inicio;

        if (inicio === -1)
            resultado = "Lista vazia";
        

        while (atual !== -1){
            resultado += " → " + valores[atual];
            atual = proximo[atual];
        }

        document.getElementById("saida").innerHTML = resultado;
    }

    function buscar(){

        let nomeBusca = document.getElementById("nome").value;

        if (nomeBusca === ""){
            alert("Digite um nome");
            return;
        }

        let anual = inicio;
        let encontrou = false;

        alert(atual + encontrou);

        while(atual !== -1){

            alert(valores[actual] + " - " +  nomeBusca);

            if (valores[actual] === nomeBusca){
                encontrou = true;
            }
            atual = proximo[atual];
        }

        if (encontrou){
            document.getElementById("saida").innerHTML = "nome encontrado na lista.";
        }else{
            document.getElementById("saida").innerHTML = "nome não encontrado na lista.";
        }
    }

    </script>

</body>
</html>
